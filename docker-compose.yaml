version: '3.8'
services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=fintrackrdb_user
      - POSTGRES_PASSWORD=fintrackrdb_password
      - POSTGRES_DB=fintrackr_db
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: