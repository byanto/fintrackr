# Datasource configuration for the Docker environment.
# It reads credentials from environment variables passed by docker-compose.yml.
spring.datasource.url=jdbc:postgresql://user-db:5432/${DB_NAME:fintrackr_user_db}
spring.datasource.username=${DB_USER:fintrackr_userdb_user}
spring.datasource.password=${DB_PASSWORD:fintrackr_userdb_password}

# Use the 'validate' strategy in Docker to ensure the schema is correct without trying to change it.
spring.jpa.hibernate.ddl-auto=validate

# Explicitly define the service registry URL for the Docker environment.
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka
