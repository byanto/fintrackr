# Configuration for the 'test' environment (used by GitHub Actions CI)

# --- Test Environment Specific Properties ---

# PostgreSQL Database Connection
# This special JDBC URL tells Spring Boot to start a PostgreSQL 16 container
# automatically for any test using this profile.
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///fintrackr_db
spring.datasource.username=fintrackrdb_user
spring.datasource.password=${DB_PASSWORD} # The password remains a secret

# Settings useful for testing. 'update' ensures a clean schema for tests.
# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true