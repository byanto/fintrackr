# Configuration for the 'dev' (local development) environment

# --- Dev Environment Specific Properties ---

# PostgreSQL Database Connection
spring.datasource.url=jdbc:tc:postgresql:17-alpine:///fintrackr_db
spring.datasource.username=fintrackrdb_user
spring.datasource.password=${DB_PASSWORD} # The password remains a secret loaded from an environment variable

# Settings useful for development, but should NOT be used in production.
# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true